<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How Your IC Number Works — Interactive Tutorial</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #fafafa;
  --card: #ffffff;
  --text: #09090b;
  --text2: #52525b;
  --text3: #a1a1aa;
  --border: #e4e4e7;
  --border2: #d4d4d8;
  --accent: #18181b;
  --accent-blue: #2563eb;
  --accent-hover: #000000;
  --accent-light: rgba(24,24,27,0.04);
  --date: #2563eb;
  --place: #7c3aed;
  --seq: #ea580c;
  --chk: #059669;
  --valid: #059669;
  --valid-bg: rgba(5,150,105,0.08);
  --invalid: #dc2626;
  --invalid-bg: rgba(220,38,38,0.08);
  --pink: #db2777;
  --pink-bg: rgba(219,39,119,0.06);
  --shadow: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.06);
  --radius: 8px;
  --radius-lg: 10px;
}

[data-theme="dark"] {
  --bg: #09090b;
  --card: #18181b;
  --text: #fafafa;
  --text2: #a1a1aa;
  --text3: #71717a;
  --border: #27272a;
  --border2: #3f3f46;
  --accent: #fafafa;
  --accent-blue: #3b82f6;
  --accent-hover: #ffffff;
  --accent-light: rgba(250,250,250,0.06);
  --date: #60a5fa;
  --place: #a78bfa;
  --seq: #fb923c;
  --chk: #34d399;
  --valid: #34d399;
  --valid-bg: rgba(52,211,153,0.1);
  --invalid: #f87171;
  --invalid-bg: rgba(248,113,113,0.1);
  --pink: #f472b6;
  --pink-bg: rgba(244,114,182,0.08);
  --shadow: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.4);
}

html, body { height: 100%; }

body {
  font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
  transition: background 0.2s, color 0.2s;
}

body.lang-zh { font-family: 'Noto Sans SC', 'Inter', sans-serif; }

.app {
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 18px 16px 28px;
}

header { margin-bottom: 20px; }

.top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 14px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.brand-logo {
  width: 32px; height: 32px;
  background: var(--accent);
  color: var(--card);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: -0.3px;
  flex-shrink: 0;
}

.brand-text { min-width: 0; }
.brand-title { font-size: 14px; font-weight: 700; letter-spacing: -0.2px; line-height: 1.2; }
.brand-subtitle { font-size: 11px; color: var(--text3); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.header-controls {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}

.lang-switcher {
  display: flex;
  gap: 1px;
  background: var(--border);
  border-radius: 6px;
  padding: 2px;
  margin-right: 2px;
}

.lang-btn {
  font-family: inherit;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 8px;
  border: none;
  background: transparent;
  color: var(--text2);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.1px;
}

.lang-btn.active { background: var(--card); color: var(--text); box-shadow: var(--shadow); }
.lang-btn:hover:not(.active) { color: var(--text); }

.icon-btn {
  width: 30px; height: 30px;
  border: none;
  background: transparent;
  color: var(--text2);
  border-radius: 6px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}

.icon-btn:hover { background: var(--border); color: var(--text); }
.icon-btn.active { color: var(--accent-blue); background: var(--accent-light); }
.icon-btn svg { width: 16px; height: 16px; }

@keyframes speakPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.12); }
}

.icon-btn.speaking { color: var(--accent-blue); }
.icon-btn.speaking svg { animation: speakPulse 0.8s ease-in-out infinite; }

.quick-mode-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  margin: 10px 0 0;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
  text-align: left;
  width: 100%;
  font-family: inherit;
  color: inherit;
}

.quick-mode-card:hover { border-color: var(--text3); background: var(--accent-light); }

.quick-mode-icon {
  width: 36px; height: 36px;
  background: var(--border);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text);
  flex-shrink: 0;
}

.quick-mode-icon svg { width: 15px; height: 15px; }

.quick-mode-card .qm-text { flex: 1; min-width: 0; }
.quick-mode-card h4 { font-size: 13px; font-weight: 600; margin: 0 0 2px; color: var(--text); }
.quick-mode-card p { font-size: 12px; color: var(--text2); margin: 0; line-height: 1.4; }
.quick-mode-card .qm-arrow { color: var(--text3); font-size: 18px; flex-shrink: 0; }

.progress-wrap { cursor: pointer; }

.progress {
  height: 3px;
  background: var(--border);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 6px;
}

.progress-bar {
  height: 100%;
  background: var(--accent);
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 999px;
}

.step-counter { font-size: 11px; color: var(--text3); font-weight: 500; letter-spacing: 0.1px; }

main { flex: 1; display: flex; flex-direction: column; }

.step { animation: slideIn 0.35s ease; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

@keyframes bounceIn {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes confetti {
  0% { transform: translateY(0) rotate(0); opacity: 1; }
  100% { transform: translateY(350px) rotate(540deg); opacity: 0; }
}

h2 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.4px;
  line-height: 1.25;
  margin-bottom: 10px;
}

p { font-size: 15px; color: var(--text2); margin-bottom: 14px; }
p strong { color: var(--text); font-weight: 600; }

.step-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 4px;
}

.ic-row {
  display: flex;
  justify-content: center;
  gap: 3px;
  padding: 18px 8px;
  background: var(--card);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  margin: 14px 0 16px;
  flex-wrap: wrap;
}

.digit {
  width: 32px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 17px;
  font-weight: 600;
  background: var(--border);
  color: var(--text);
  border-radius: 6px;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] .digit { background: #27272a; }

.digit.date { color: var(--date); background: rgba(37,99,235,0.08); }
.digit.place { color: var(--place); background: rgba(124,58,237,0.08); }
.digit.seq { color: var(--seq); background: rgba(234,88,12,0.08); }
.digit.chk { color: var(--chk); background: rgba(5,150,105,0.08); }
.digit.dim { opacity: 0.2; }
.digit.highlight {
  transform: scale(1.1);
  box-shadow: 0 0 0 2px var(--accent-blue);
  z-index: 2;
}
.digit.empty { background: transparent; border: 1.5px dashed var(--border2); color: var(--text3); }
.digit.appearing { animation: bounceIn 0.45s ease; }
.digit.sourcing { background: #fbbf24; color: #78350f; transform: scale(1.08); }

[data-theme="dark"] .digit.sourcing { background: #fbbf24; color: #78350f; }

.digit-gap { width: 7px; }

.ic-labels {
  display: flex;
  justify-content: center;
  gap: 3px;
  margin-top: -8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.ic-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  padding: 3px 7px;
  border-radius: 4px;
  color: #fff;
}

[data-theme="dark"] .ic-label { color: #09090b; }

.ic-label.date { background: var(--date); }
.ic-label.place { background: var(--place); }
.ic-label.seq { background: var(--seq); }
.ic-label.chk { background: var(--chk); }

.info-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  margin-bottom: 10px;
}

.info-card.accent { background: var(--accent-light); }
.info-card.valid { background: var(--valid-bg); border-color: var(--valid); }

.info-card h3 { font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
.info-card p { font-size: 13px; margin-bottom: 0; color: var(--text2); }
.info-card .age-pill {
  display: inline-block;
  background: var(--accent);
  color: var(--card);
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 999px;
  margin-left: 6px;
  font-family: 'JetBrains Mono', monospace;
}

.expand-btn {
  margin-top: 8px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  padding: 6px 12px;
  background: var(--border);
  color: var(--text);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}

.expand-btn:hover { background: var(--border2); }

.states-panel {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}

.states-panel.open { max-height: 500px; overflow-y: auto; margin-top: 10px; }

.states-table { width: 100%; border-collapse: collapse; font-size: 12px; }

.states-table td {
  padding: 5px 8px;
  border-bottom: 1px solid var(--border);
  color: var(--text2);
}

.states-table td:first-child {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  color: var(--place);
  width: 48px;
}

.states-table tr.current td { background: var(--accent-light); color: var(--text); font-weight: 600; }

.states-section-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 10px 8px 4px;
}

.dual-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.dual-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px;
}

.dual-card .tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  padding: 2px 7px;
  border-radius: 4px;
  margin-bottom: 8px;
  color: var(--card);
  background: var(--accent);
}

.dual-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.dual-card p { font-size: 12px; margin: 0; color: var(--text2); line-height: 1.45; }

.gender-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 14px 0;
}

.gender-col {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 10px;
  text-align: center;
}

.gender-col.male { border-color: var(--date); }
.gender-col.female { border-color: var(--pink); }

.gender-col .label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 10px;
  display: block;
  color: var(--text2);
}

.digit-row-mini {
  display: flex;
  justify-content: center;
  gap: 4px;
  flex-wrap: wrap;
}

.digit-mini {
  width: 26px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  border-radius: 5px;
  background: var(--border);
  color: var(--text2);
}

.digit-mini.active-m { background: var(--date); color: #fff; transform: scale(1.15); }
.digit-mini.active-f { background: var(--pink); color: #fff; transform: scale(1.15); }

.gender-result {
  font-size: 13px;
  font-weight: 600;
  margin-top: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text);
}

.flip-container { margin: 14px 0; }

.flip-section-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.flip-row {
  display: flex;
  justify-content: center;
  gap: 3px;
  padding: 14px 8px;
  background: var(--card);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  margin-bottom: 8px;
  flex-wrap: wrap;
}

.flip-arrow { text-align: center; font-size: 18px; margin: 6px 0; color: var(--text3); }

.play-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin: 10px auto 0;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  padding: 8px 16px;
  background: var(--accent);
  color: var(--card);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}

.play-btn:hover { background: var(--accent-hover); }
.play-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.play-btn svg { width: 12px; height: 12px; }

.play-btn-wrap { display: flex; justify-content: center; }

.weights-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px;
  margin: 14px 0;
  overflow-x: auto;
}

.weights-table {
  display: grid;
  grid-template-columns: auto repeat(11, 1fr);
  gap: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  min-width: 100%;
}

.weights-table .cell { padding: 6px 2px; text-align: center; border-radius: 4px; }
.weights-table .label {
  font-weight: 600;
  color: var(--text3);
  padding-right: 8px;
  text-align: right;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.weights-table .position { color: var(--text3); }
.weights-table .weight { font-weight: 700; color: var(--text); background: var(--border); }

.mult-list { display: flex; flex-direction: column; gap: 6px; margin: 14px 0; }

.mult-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr auto 1fr;
  align-items: center;
  gap: 6px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}

.mult-row:hover { border-color: var(--accent); }
.mult-row.revealed { background: var(--valid-bg); border-color: var(--valid); }

.mult-row .op { color: var(--text3); font-weight: 400; }
.mult-row .digit-val { color: var(--seq); }
.mult-row .weight-val { color: var(--date); }
.mult-row .result-val { color: var(--text3); font-weight: 600; transition: color 0.2s; }
.mult-row.revealed .result-val { color: var(--valid); }

.reveal-all-btn {
  display: block;
  margin: 8px auto 0;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  padding: 7px 14px;
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}

.reveal-all-btn:hover { border-color: var(--text3); color: var(--text); }

.calc-display {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 16px;
  margin: 14px 0;
  text-align: center;
}

.calc-display .expression {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 10px;
  line-height: 1.7;
  word-wrap: break-word;
}

.calc-display .equals-label {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 4px;
  font-weight: 600;
}

.calc-display .total {
  font-family: 'JetBrains Mono', monospace;
  font-size: 36px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
}

.calc-display .div-line {
  font-family: 'JetBrains Mono', monospace;
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}

.calc-display .highlight-num {
  background: var(--valid-bg);
  color: var(--valid);
  padding: 2px 10px;
  border-radius: 5px;
  font-weight: 700;
}

.calc-display .div-note {
  font-size: 12px;
  color: var(--text3);
  margin-top: 8px;
  font-family: 'JetBrains Mono', monospace;
}

.formula-display {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 16px;
  margin: 14px 0;
  text-align: center;
}

.formula-line {
  font-family: 'JetBrains Mono', monospace;
  font-size: 17px;
  font-weight: 600;
  margin: 6px 0;
  color: var(--text);
}

.formula-line .var { color: var(--seq); font-weight: 700; }
.formula-line .result { color: var(--valid); font-weight: 700; }

.formula-note { font-size: 12px; color: var(--text3); margin-top: 10px; font-style: italic; }

.reveal { text-align: center; padding: 12px 0 6px; position: relative; }

.reveal-match { font-size: 48px; margin-bottom: 6px; animation: pop 0.7s ease; }

.reveal-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--valid);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.reveal-title.fail { color: var(--invalid); }

.reveal-comparison {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.reveal-box {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px;
  text-align: center;
}

.reveal-box.match { border-color: var(--valid); background: var(--valid-bg); }
.reveal-box.fail { border-color: var(--invalid); background: var(--invalid-bg); }

.reveal-box .label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 6px;
}

.reveal-box .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 40px;
  font-weight: 700;
  color: var(--valid);
  line-height: 1;
}

.reveal-box.fail .value { color: var(--invalid); }

.confetti-piece {
  position: absolute;
  width: 7px;
  height: 7px;
  animation: confetti 1.8s ease-out forwards;
  pointer-events: none;
}

.ap-caption-bar {
  position: sticky;
  top: 0;
  background: var(--bg);
  padding: 10px 0;
  margin-bottom: 10px;
  z-index: 5;
  border-bottom: 1px solid var(--border);
}

.ap-caption {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  margin-bottom: 6px;
  min-height: 21px;
  transition: opacity 0.2s;
}

.ap-time-progress {
  height: 2px;
  background: var(--border);
  border-radius: 999px;
  overflow: hidden;
}

.ap-time-bar {
  height: 100%;
  background: var(--accent);
  width: 0%;

function t(key) { return L[state.lang]?.[key] ?? L.en[key] ?? key; }
function tt(key, vars) {
  let s = t(key);
  if (vars) for (const k in vars) s = s.replaceAll('%' + k + '%', vars[k]);
  return s;
}

// ============ SPEECH / NARRATION ============
const VOICE_LANG = { en: 'en-US', bm: 'ms-MY', zh: 'zh-CN' };
const SPEECH_SUPPORTED = 'speechSynthesis' in window;

let voicesLoaded = false;
if (SPEECH_SUPPORTED) {
  const loadVoices = () => { voicesLoaded = speechSynthesis.getVoices().length > 0; };
  loadVoices();
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
  }
}

function pickVoice(langCode) {
  if (!SPEECH_SUPPORTED) return null;
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return null;
  let v = voices.find(x => x.lang === langCode);
  if (v) return v;
  const prefix = langCode.split('-')[0];
  v = voices.find(x => x.lang.toLowerCase().startsWith(prefix));
  return v || null;
}

function speak(text) {
  if (!state.voiceEnabled || !SPEECH_SUPPORTED || !text) return;
  const clean = String(text).replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
  if (!clean) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(clean);
    const langCode = VOICE_LANG[state.lang] || 'en-US';
    u.lang = langCode;
    const v = pickVoice(langCode);
    if (v) u.voice = v;
    u.rate = 0.95;
    u.pitch = 1;
    u.onstart = () => { const btn = document.getElementById('voiceBtn'); if (btn) btn.classList.add('speaking'); };
    u.onend = () => { const btn = document.getElementById('voiceBtn'); if (btn) btn.classList.remove('speaking'); };
    u.onerror = () => { const btn = document.getElementById('voiceBtn'); if (btn) btn.classList.remove('speaking'); };
    speechSynthesis.speak(u);
  } catch (e) { /* silent */ }
}

function stopSpeech() {
  if (SPEECH_SUPPORTED) speechSynthesis.cancel();
  const btn = document.getElementById('voiceBtn');
  if (btn) btn.classList.remove('speaking');
}

// Per-step narration lookup
function getStepSpeech() {
  const keys = ['s0_speech','s1_speech','s2_speech','s3_speech','s4_speech','s5_speech','s6_speech','s7_speech','s8_speech','s9_speech',null,'sA_speech','s11_speech','s12_speech'];
  // Step 10 (reveal) needs dynamic match-based speech
  if (state.step === 10) {
    const d = calc(state.ic);
    return t(d.matches ? 's10_speech_match' : 's10_speech_fail');
  }
  const k = keys[state.step];
  return k ? t(k) : '';
}

// ============ MATH ============
function calc(ic) {
  const digits = ic.split('').map(Number);
  const first11 = digits.slice(0, 11);
  const last = digits[11];
  const reversed = [...first11].reverse();
  const products = reversed.map((d, i) => d * WEIGHTS[i]);
  const sum = products.reduce((a, b) => a + b, 0);
  const remainder = sum % 11;
  const predicted = (12 - remainder) % 11;
  const matches = predicted === last && predicted !== 10;
  const isMale = last % 2 === 1;
  return { digits, first11, last, reversed, products, sum, remainder, predicted, matches, isMale };
}

function formatIC(ic) { return ic.slice(0,6) + '-' + ic.slice(6,8) + '-' + ic.slice(8); }

function dateParts(ic) {
  const yy = ic.slice(0,2), mm = ic.slice(2,4), dd = ic.slice(4,6);
  const d9 = parseInt(ic[8], 10);
  const century = d9 >= 5 ? 1900 : 2000;
  const year = century + parseInt(yy, 10);
  return { yy, mm, dd, year, full: `${year}-${mm}-${dd}` };
}

function calcAge(year, month, day) {
  const now = new Date();
  let age = now.getFullYear() - year;
  const m = now.getMonth() + 1 - month;
  if (m < 0 || (m === 0 && now.getDate() < day)) age--;
  return age < 0 || age > 150 ? null : age;
}

function getPlaceName(code) {
  const entry = STATES[code] || FOREIGN[code];
  return entry ? entry[state.lang] || entry.en : code;
}

function icDigitsHTML(ic, opts = {}) {
  const d = ic.split('');
  let html = '<div class="ic-row">';
  d.forEach((digit, i) => {
    let cls = 'digit';
    if (opts.plain) cls += ' mono';
    else if (i < 6) cls += ' date';
    else if (i < 8) cls += ' place';
    else if (i < 11) cls += ' seq';
    else cls += ' chk';
    if (opts.dim && opts.dim.includes(i)) cls += ' dim';
    if (opts.highlight && opts.highlight.includes(i)) cls += ' highlight';
    html += `<span class="${cls}">${digit}</span>`;
    if (!opts.noGaps && (i === 5 || i === 7 || i === 10)) html += '<span class="digit-gap"></span>';
  });
  html += '</div>';
  return html;
}

function plainDigitsHTML(digits) {
  return '<div class="ic-row">' + digits.map(d => `<span class="digit mono">${d}</span>`).join('') + '</div>';
}

function emptySlotsHTML(count) {
  return '<div class="flip-row" id="flipTarget">' + 
    Array.from({length: count}, (_, i) => `<span class="digit mono empty" data-slot="${i}"></span>`).join('') + 
    '</div>';
}

          <div class="div-line">${d.sum} ÷ 11 = ${q} <span style="color:var(--text3);font-size:13px">r</span> <span class="highlight-num">${d.remainder}</span></div>
          <div class="div-note">${t('s8_because')} ${q} × 11 = ${q * 11}, ${t('s8_and')} ${d.sum} − ${q * 11} = ${d.remainder}</div>
        </div>
        <p>${tt('s8_p2', {REM: d.remainder})}</p>
      </div>`;
  },

  () => {
    const d = calc(state.ic);
    const raw = 12 - d.remainder;
    const needsMod = raw >= 11;
    return `
      <div class="step">
        <div class="step-badge">${t('step')} 7</div>
        <h2>${t('s9_h')}</h2>
        <p>${t('s9_p')}</p>
        <div class="formula-display">
          <div class="formula-line">12 − <span class="var">${d.remainder}</span> = ${raw}</div>
          <div class="formula-line">${raw} mod 11 = <span class="result">${d.predicted}</span></div>
          <div class="formula-note">${needsMod ? t('s9_mod_note') : t('s9_mod_nope')}</div>
        </div>
        <p>${t('s9_predicted')} <strong style="font-family:monospace;font-size:22px;color:var(--accent)">${d.predicted}</strong></p>
        <p>${t('s9_compare')}</p>
      </div>`;
  },

  () => {
    const d = calc(state.ic);
    const symbol = d.matches ? '✓' : '✗';
    const titleCls = d.matches ? '' : 'fail';
    const boxCls = d.matches ? 'match' : 'fail';
    const genderText = d.isMale ? t('s2_result_male') : t('s2_result_female');
    return `
      <div class="step">
        <div class="reveal" id="revealArea">
          <div class="reveal-match" style="color:${d.matches ? 'var(--valid)' : 'var(--invalid)'}">${symbol}</div>
          <div class="reveal-title ${titleCls}">${d.matches ? t('s10_match') : t('s10_no_match')}</div>
        </div>
        <div class="reveal-comparison">
          <div class="reveal-box ${boxCls}">
            <div class="label">${t('s10_we_predicted')}</div>
            <div class="value">${d.predicted}</div>
          </div>
          <div class="reveal-box ${boxCls}">
            <div class="label">${t('s10_actual')}</div>
            <div class="value">${d.last}</div>
          </div>
        </div>
        ${d.matches ? `
          <div class="info-card valid">
            <h3>${t('s10_valid_title')}</h3>
            <p>${t('s10_valid_p')}</p>
          </div>
          <div class="info-card">
            <h3>${t('s10_bonus_title')}</h3>
            <p>${tt('s10_bonus_p', {LAST: d.last})} ${genderText}</p>
          </div>
        ` : `
          <div class="info-card" style="background:var(--invalid-bg);border-color:var(--invalid)">
            <h3>${t('s10_fail_title')}</h3>
            <p>${t('s10_fail_p')}</p>
          </div>
        `}
        <p style="text-align:center;margin-top:14px;font-weight:500">${t('s10_next')}</p>
      </div>`;
  },

  () => {
    const d = calc(state.ic);
    const q = Math.floor(d.sum / 11);
    const raw = 12 - d.remainder;
    let multCells = '';
    d.reversed.forEach((digit, i) => {
      multCells += `<div class="ap-mult-cell" data-cell="${i}">${digit}<span class="inline-op">×</span>${WEIGHTS[i]}<span class="inline-op">=</span>${d.products[i]}</div>`;
    });
    return `
      <div class="step">
        <h2>${t('sA_h')}</h2>
        <p>${t('sA_p')}</p>
        <div id="autoplayRoot">
          <div class="ap-caption-bar">
            <div class="ap-caption" id="apCaption">${t('sA_cap_ready')}</div>
            <div class="ap-time-progress"><div class="ap-time-bar" id="apTimeBar"></div></div>
          </div>
          <div class="ap-phase" data-phase="0">
            <div class="ap-phase-label">${t('sA_phase_digits')}</div>
            ${plainDigitsHTML(d.first11)}
          </div>
          <div class="ap-phase" data-phase="1">
            <div class="ap-phase-label">${t('sA_phase_flipped')}</div>
            ${plainDigitsHTML(d.reversed)}
          </div>
          <div class="ap-phase" data-phase="2">
            <div class="ap-phase-label">${t('sA_phase_mult')}</div>
            <div class="ap-mult-grid" id="apMultGrid">${multCells}</div>
          </div>
          <div class="ap-phase" data-phase="3">
            <div class="ap-phase-label">${t('sA_phase_sum')}</div>
            <div class="calc-display">
              <div class="expression">${d.products.join(' + ')}</div>
              <div class="equals-label">${t('s7_equals')}</div>
              <div class="total">${d.sum}</div>
            </div>
          </div>
          <div class="ap-phase" data-phase="4">
            <div class="ap-phase-label">${t('sA_phase_divide')}</div>
            <div class="calc-display">
              <div class="div-line">${d.sum} ÷ 11 = ${q} r <span class="highlight-num">${d.remainder}</span></div>
            </div>
          </div>
          <div class="ap-phase" data-phase="5">
            <div class="ap-phase-label">${t('sA_phase_formula')}</div>
            <div class="formula-display">
              <div class="formula-line">12 − ${d.remainder} = ${raw}</div>
              <div class="formula-line">${raw} mod 11 = <span class="result">${d.predicted}</span></div>
            </div>
          </div>
          <div class="ap-phase" data-phase="6">
            <div class="ap-phase-label">${t('sA_phase_reveal')}</div>
            <div class="reveal-comparison">
              <div class="reveal-box ${d.matches ? 'match' : 'fail'}">
                <div class="label">${t('s10_we_predicted')}</div>
                <div class="value">${d.predicted}</div>
              </div>
              <div class="reveal-box ${d.matches ? 'match' : 'fail'}">
                <div class="label">${t('s10_actual')}</div>
                <div class="value">${d.last}</div>
              </div>
            </div>
          </div>
          <div class="ap-controls">
            <button class="ap-control-btn" id="apPlayBtn" onclick="playAutoplay()">${ICONS.play} ${t('sA_play')}</button>
          </div>
        </div>
      </div>`;
  },

  () => `
    <div class="step">
      <h2>${t('s11_h')}</h2>
      <p>${t('s11_p')}</p>
      <div class="features-grid">
        <div class="feature-card"><div class="feature-icon">${ICONS.laser}</div><h4>${t('s11_f1_title')}</h4><p>${t('s11_f1_p')}</p></div>
        <div class="feature-card"><div class="feature-icon">${ICONS.rainbow}</div><h4>${t('s11_f2_title')}</h4><p>${t('s11_f2_p')}</p></div>
        <div class="feature-card"><div class="feature-icon">${ICONS.pattern}</div><h4>${t('s11_f3_title')}</h4><p>${t('s11_f3_p')}</p></div>
        <div class="feature-card"><div class="feature-icon">${ICONS.ghost}</div><h4>${t('s11_f4_title')}</h4><p>${t('s11_f4_p')}</p></div>
        <div class="feature-card"><div class="feature-icon">${ICONS.uv}</div><h4>${t('s11_f5_title')}</h4><p>${t('s11_f5_p')}</p></div>
        <div class="feature-card"><div class="feature-icon">${ICONS.chip}</div><h4>${t('s11_f6_title')}</h4><p>${t('s11_f6_p')}</p></div>
        <div class="feature-card"><div class="feature-icon">${ICONS.copy}</div><h4>${t('s11_f7_title')}</h4><p>${t('s11_f7_p')}</p></div>
        <div class="feature-card highlight"><div class="feature-icon">${ICONS.math}</div><h4>${t('s11_f8_title')}</h4><p>${t('s11_f8_p')}</p></div>
      </div>
      <p>${t('s11_p2')}</p>
    </div>`,

  () => `
    <div class="step">
      <h2>${t('s12_h')}</h2>
      <p>${t('s12_p')}</p>
      <div class="input-group">
        <label>${t('s12_label')}</label>
        <input type="text" id="customIC" maxlength="12" placeholder="850101135029" inputmode="numeric" oninput="checkCustom(this.value)" autocomplete="off">
        <div class="quick-result" id="quickResult"></div>
      </div>
      <button class="btn btn-filled" id="useCustomBtn" onclick="useCustomIC()" style="display:none">${t('s12_walk')}</button>
      <button class="btn btn-outline" onclick="restartDefault()">${t('s12_restart_default')}</button>
      <div class="disclaimer">
        <strong>${t('s12_disclaimer_title')}</strong><br>${t('s12_disclaimer')}
      </div>
      <p style="text-align:center;margin:12px 0 4px">
        <a class="wiki-link" href="https://en.wikipedia.org/wiki/ISO/IEC_7064" target="_blank" rel="noopener">${t('s12_learn_more')} →</a>
      </p>
      <p style="text-align:center;font-size:12px;color:var(--text3);margin-top:20px">${t('s12_made_with')}</p>
    </div>`
];

const stage = document.getElementById('stage');
const progressBar = document.getElementById('progressBar');
const stepNum = document.getElementById('stepNum');
const stepTotal = document.getElementById('stepTotal');
const backBtn = document.getElementById('backBtn');
const nextBtn = document.getElementById('nextBtn');
const backText = document.getElementById('backText');
const nextText = document.getElementById('nextText');
const stepLabel = document.getElementById('stepLabel');
const ofLabel = document.getElementById('ofLabel');
const brandTitle = document.getElementById('brandTitle');
const brandSubtitle = document.getElementById('brandSubtitle');
const kbdHintText = document.getElementById('kbdHintText');

stepTotal.textContent = steps.length;

function clearAutoplayTimers() {
  state.autoplayTimers.forEach(id => clearTimeout(id));
  state.autoplayTimers = [];
  if (state.autoplayRAF) { cancelAnimationFrame(state.autoplayRAF); state.autoplayRAF = null; }
}

function render() {
  clearAutoplayTimers();
  stopSpeech();
  stage.innerHTML = steps[state.step]();
  const pct = ((state.step + 1) / steps.length) * 100;
  progressBar.style.width = pct + '%';
  stepNum.textContent = state.step + 1;
  backBtn.disabled = state.step === 0;
  
  brandTitle.textContent = t('brand_title');
  brandSubtitle.textContent = t('brand_subtitle');
  stepLabel.textContent = t('step');
  ofLabel.textContent = t('of');
  backText.textContent = t('back');
  kbdHintText.textContent = t('kbd_hint');
  
  if (state.step === 0) nextText.textContent = t('lets_go');
  else if (state.step === steps.length - 1) nextText.textContent = t('start_over');
  else if (state.step === steps.length - 2) nextText.textContent = t('try_own');
  else nextText.textContent = t('next');
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
  
  if (state.step === 4 && !state.flipPlayed) setTimeout(() => playFlip(), 400);
  
  if (state.step === 10) {
    const d = calc(state.ic);
    if (d.matches) setTimeout(() => launchConfetti(document.getElementById('revealArea')), 300);
  }
  
  if (state.step === AUTOPLAY_STEP) {
    setTimeout(() => playAutoplay(), 500);
  } else {
    // Speak step intro after brief delay (for non-autoplay steps)
    if (state.voiceEnabled) {
      setTimeout(() => speak(getStepSpeech()), 450);
    }
  }
}

function goNext() {
  if (state.step < steps.length - 1) {
    state.step++;
    if (state.step === 6) state.revealedMults.clear();
    if (state.step === 4) state.flipPlayed = false;
    render();
  } else {
    state.step = 0;
    state.revealedMults.clear();
    state.flipPlayed = false;
    render();
  }
}

function goBack() {
  if (state.step > 0) {
    state.step--;
    if (state.step === 4) state.flipPlayed = false;
    render();
  }
}

nextBtn.addEventListener('click', goNext);
backBtn.addEventListener('click', goBack);

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goBack(); }
});

document.getElementById('progressWrap').addEventListener('click', (e) => {
  const rect = document.querySelector('.progress').getBoundingClientRect();
  const x = e.clientX - rect.left;
  const pct = Math.max(0, Math.min(1, x / rect.width));
  const target = Math.min(steps.length - 1, Math.floor(pct * steps.length));
  state.step = target;
  state.revealedMults.clear();
  state.flipPlayed = false;
  render();
});

// ============ THEME ============
function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.theme);
  localStorage.setItem('ic_theme', state.theme);
  const btn = document.getElementById('themeBtn');
  btn.innerHTML = state.theme === 'dark' ? ICONS.sun : ICONS.moon;
}

document.getElementById('themeBtn').addEventListener('click', () => {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  applyTheme();
});

applyTheme();

// ============ VOICE TOGGLE ============
function updateVoiceButton() {
  const btn = document.getElementById('voiceBtn');
  btn.innerHTML = state.voiceEnabled ? ICONS.volumeOn : ICONS.volumeOff;
  btn.classList.toggle('active', state.voiceEnabled);
}

function showVoiceHint(key) {
  const hint = document.getElementById('voiceHint');
  hint.innerHTML = t(key);
  hint.classList.add('show');
  clearTimeout(hint._hideTimer);
  hint._hideTimer = setTimeout(() => hint.classList.remove('show'), 3000);
}

document.getElementById('voiceBtn').addEventListener('click', () => {
  if (!SPEECH_SUPPORTED) {
    showVoiceHint('voice_unavailable');
    return;
  }
  state.voiceEnabled = !state.voiceEnabled;
  localStorage.setItem('ic_voice', state.voiceEnabled ? '1' : '0');
  updateVoiceButton();
  
  if (state.voiceEnabled) {
    showVoiceHint('voice_on_hint');
    // Speak current step to confirm
    setTimeout(() => speak(getStepSpeech()), 100);
  } else {
    showVoiceHint('voice_off_hint');
    stopSpeech();
  }
});

updateVoiceButton();

// ============ LANGUAGE ============
document.getElementById('langSwitcher').addEventListener('click', (e) => {
  const btn = e.target.closest('.lang-btn');
  if (!btn) return;
  const lang = btn.dataset.lang;
  state.lang = lang;
  localStorage.setItem('ic_lang', lang);
  document.body.classList.toggle('lang-zh', lang === 'zh');
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  render();
});

document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === state.lang));
document.body.classList.toggle('lang-zh', state.lang === 'zh');

// ============ INTERACTIVE ============
window.toggleStates = function() { state.statesOpen = !state.statesOpen; render(); };

window.jumpToAutoplay = function() {
  state.step = AUTOPLAY_STEP;
  render();
};

window.revealMult = function(idx) {
  state.revealedMults.add(idx);
  const row = document.querySelector(`.mult-row[data-idx="${idx}"]`);
  if (row) {
    const d = calc(state.ic);
    row.classList.add('revealed');
    row.querySelector('.result-val').textContent = d.products[idx];
  }
};

window.revealAllMults = function() {
  const d = calc(state.ic);
  for (let i = 0; i < 11; i++) state.revealedMults.add(i);
  document.querySelectorAll('.mult-row').forEach(row => {
    const idx = parseInt(row.dataset.idx, 10);
    row.classList.add('revealed');
    row.querySelector('.result-val').textContent = d.products[idx];
  });
};

window.playFlip = function() {
  const d = calc(state.ic);
  const target = document.getElementById('flipTarget');
  const source = document.getElementById('flipSource');
  const playBtn = document.getElementById('playFlipBtn');
  if (!target || !source) return;
  const slots = target.querySelectorAll('.digit');
  const sources = source.querySelectorAll('.digit');
  slots.forEach(s => { s.textContent = ''; s.classList.add('empty'); s.classList.remove('appearing'); });
  sources.forEach(s => s.classList.remove('sourcing'));
  if (playBtn) playBtn.disabled = true;
  const delay = 320;
  d.reversed.forEach((digit, i) => {
    const srcIdx = 10 - i;
    setTimeout(() => sources[srcIdx].classList.add('sourcing'), i * delay);
    setTimeout(() => {
      sources[srcIdx].classList.remove('sourcing');
      slots[i].textContent = digit;
      slots[i].classList.remove('empty');
      slots[i].classList.add('appearing');
    }, i * delay + 180);
  });
  setTimeout(() => {
    state.flipPlayed = true;
    if (playBtn) {
      playBtn.disabled = false;
      playBtn.innerHTML = ICONS.replay + ' ' + t('s4_replay');
    }
  }, 11 * delay + 300);
};

window.playAutoplay = function() {
  clearAutoplayTimers();
  stopSpeech();
  
  const d = calc(state.ic);
  const root = document.getElementById('autoplayRoot');
  if (!root) return;
  
  const phases = root.querySelectorAll('.ap-phase');
  const cells = root.querySelectorAll('.ap-mult-cell');
  const caption = document.getElementById('apCaption');
  const timeBar = document.getElementById('apTimeBar');
  const playBtn = document.getElementById('apPlayBtn');
  
  phases.forEach(p => p.classList.remove('visible'));
  cells.forEach(c => c.classList.remove('visible'));
  if (timeBar) timeBar.style.width = '0%';
  if (playBtn) playBtn.disabled = true;
  
  setTimeout(() => root.scrollIntoView({behavior: 'smooth', block: 'start'}), 50);
  
  const script = [
    { t: 300,   phase: 0, cap: t('sA_cap_intro') },
    { t: 2200,  phase: 1, cap: t('sA_cap_flip') },
    { t: 4400,  phase: 2, cap: t('sA_cap_mult') },
    { t: 9200,  phase: 3, cap: t('sA_cap_sum') },
    { t: 11800, phase: 4, cap: t('sA_cap_divide') },
    { t: 14000, phase: 5, cap: t('sA_cap_formula') },
    { t: 16200, phase: 6, cap: d.matches ? t('sA_cap_reveal_match') : t('sA_cap_reveal_fail') }
  ];
  
  const TOTAL = 18500;
  
  script.forEach(s => {
    state.autoplayTimers.push(setTimeout(() => {
      if (phases[s.phase]) phases[s.phase].classList.add('visible');
      if (caption) {
        caption.style.opacity = '0';
        setTimeout(() => { caption.textContent = s.cap; caption.style.opacity = '1'; }, 150);
      }
      // Narrate this phase if voice enabled
      if (state.voiceEnabled) speak(s.cap);
      setTimeout(() => {
        const visible = phases[s.phase];
        if (visible) visible.scrollIntoView({behavior: 'smooth', block: 'center'});
      }, 200);
    }, s.t));
  });
  
  for (let i = 0; i < 11; i++) {
    state.autoplayTimers.push(setTimeout(() => {
      if (cells[i]) cells[i].classList.add('visible');
    }, 4600 + i * 380));
  }
  
  const startTime = Date.now();
  function tickBar() {
    const elapsed = Date.now() - startTime;
    const pct = Math.min(100, (elapsed / TOTAL) * 100);
    if (timeBar) timeBar.style.width = pct + '%';
    if (elapsed < TOTAL) state.autoplayRAF = requestAnimationFrame(tickBar);
  }
  state.autoplayRAF = requestAnimationFrame(tickBar);
  
  state.autoplayTimers.push(setTimeout(() => {
    if (playBtn) {
      playBtn.disabled = false;
      playBtn.innerHTML = ICONS.replay + ' ' + t('sA_replay');
    }
    if (d.matches) {
      const revealPhase = phases[6];
      if (revealPhase) launchConfetti(revealPhase);
    }
  }, TOTAL + 500));
};

window.checkCustom = function(val) {
  const clean = val.replace(/\D/g, '');
  const resultEl = document.getElementById('quickResult');
  const useBtn = document.getElementById('useCustomBtn');
  if (clean.length !== 12) {
    resultEl.classList.remove('show');
    if (useBtn) useBtn.style.display = 'none';
    return;
  }
  const d = calc(clean);
  resultEl.classList.add('show');
  const genderText = d.isMale ? t('male') : t('female');
  if (d.matches) {
    resultEl.className = 'quick-result show valid';
    resultEl.innerHTML = tt('s12_valid', {PRED: d.predicted, LAST: d.last, GENDER: genderText});
  } else {
    resultEl.className = 'quick-result show invalid';
    resultEl.innerHTML = tt('s12_invalid', {PRED: d.predicted, LAST: d.last});
  }
  if (useBtn) useBtn.style.display = '';
};

window.useCustomIC = function() {
  const input = document.getElementById('customIC');
  if (!input) return;
  const clean = input.value.replace(/\D/g, '');
  if (clean.length !== 12) return;
  state.ic = clean;
  state.step = 0;
  state.revealedMults.clear();
  state.flipPlayed = false;
  render();
};

window.restartDefault = function() {
  state.ic = DEFAULT_IC;
  state.step = 0;
  state.revealedMults.clear();
  state.flipPlayed = false;
  render();
};

function launchConfetti(area) {
  if (!area) return;
  area.style.position = 'relative';
  const colors = ['#2563eb', '#7c3aed', '#059669', '#ea580c', '#db2777', '#f59e0b'];
  for (let i = 0; i < 20; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = (50 + (Math.random() - 0.5) * 90) + '%';
    piece.style.top = '20px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDelay = (Math.random() * 0.2) + 's';
    piece.style.animationDuration = (1.4 + Math.random() * 0.6) + 's';
    area.appendChild(piece);
    setTimeout(() => piece.remove(), 2200);
  }
}

render();
</script>
